</head>
<body>

  <nav>

    </ul>
  </nav>

  <main>

    <section id="posts" class="section-first">
      <p class="section-label">Posts</p>

      <button type="button" class="start-post-bar" id="open-composer">
        <span class="post-avatar"></span>
        Start a post
      </button>

      <div class="posts-scroll">
      </div>
    </section>

    <div class="divider"></div>
    <footer id="contact">
      <div class="footer-grid">
        <div>
          <p class="footer-name">Paul Trusov</p>
          <p class="footer-tagline">paultrusov.<span data-secret-trigger class="secret-trigger">me</span></p>
        </div>
        <div class="footer-links">
          <a href="https://www.linkedin.com/in/paul-trusov-21a483322/" target="_blank" rel="noopener">
            <span class="footer-icon">in</span> paul-trusov
          </a>
          <a href="https://github.com/nerap2000" target="_blank" rel="noopener">
            <span class="footer-icon">GH</span> nerap2000
          </a>
        </div>
        <div class="footer-info">
          <p>paulmtrusov [at] gmail [dot] com</p>
          <a href="img/cv/PaulTrusov.pdf" target="_blank">Resume</a>
        </div>
      </div>
    </footer>

  </main>

  <div class="modal-overlay" id="post-composer">
    <div class="composer-card">
      <button class="composer-close" id="composer-close" aria-label="Close">&times;</button>

      <div class="composer-header">
        <div class="composer-avatar"></div>
        <div>
          <p class="composer-name">
            Paul Trusov
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 1L5 5L9 1"/></svg>
          </p>
          <p class="composer-audience">Post to Anyone</p>
        </div>
      </div>

      <div class="composer-textarea" id="composer-text" contenteditable="true" data-placeholder="What do you want to talk about?"></div>

      <div class="composer-image-preview" id="composer-image-preview"></div>

      <div class="composer-toolbar">
        <button type="button" class="composer-icon-btn" id="composer-link-btn" aria-label="Add link to selected text">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M7.5 10.5a3 3 0 0 0 4.24 0l1.5-1.5a3 3 0 1 0-4.24-4.24l-.86.86"/><path d="M10.5 7.5a3 3 0 0 0-4.24 0l-1.5 1.5a3 3 0 1 0 4.24 4.24l.86-.86"/></svg>
        </button>
        <label class="composer-icon-btn" aria-label="Add image">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1.5" y="2.5" width="15" height="13" rx="1.5"/><circle cx="6" cy="7" r="1.5"/><path d="M2 13.5L6.5 9.5L9.5 12L12.5 8.5L16.5 13"/></svg>
          <input type="file" id="composer-image-input" accept="image/*" multiple style="display:none;" />
        </label>
      </div>

      <div class="composer-footer">
        <button type="button" class="composer-icon-btn" aria-label="Schedule">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="9" cy="9" r="7.3"/><path d="M9 5V9L11.5 10.8"/></svg>
        </button>
        <button type="button" class="btn btn-primary" id="composer-submit">Post</button>
      </div>
    </div>
  </div>

  <div class="auth-message" id="auth-message"></div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="js/editor.js?v=1783224225"></script>

</body>
</html>
